<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<base target="_blank">
<title>Daily Links</title>

<style>
/* ================== Theme Variables ================== */
:root {
  --bg: #f4f6f8;
  --card: #ffffff;
  --text: #222;
  --subtext: #555;
  --accent: #0b5ed7;
  --shadow: 0 4px 10px rgba(0,0,0,.08);
}

body.dark {
  --bg: #121212;
  --card: #1e1e1e;
  --text: #e0e0e0;
  --subtext: #aaa;
  --accent: #4dabf7;
  --shadow: 0 6px 16px rgba(0,0,0,.6);
}

/* ================== Base ================== */
* {
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  transition: background .25s ease, color .25s ease;
}

/* ================== Top Bar ================== */
.topbar {
  position: sticky;
  top: 0;
  display: flex;
  gap: 12px;
  padding: 12px;
  background: var(--card);
  box-shadow: var(--shadow);
  z-index: 10;
}

.topbar input {
  flex: 1;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid #bbb;
  background: transparent;
  color: var(--text);
}

.topbar button {
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: var(--accent);
  color: #fff;
  font-size: .9rem;
  white-space: nowrap;
}

/* ================== Cards ================== */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 16px;
}

.grid {
  display: grid;
  gap: 16px;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}

.card {
  background: var(--card);
  padding: 18px;
  border-radius: 12px;
  text-decoration: none;
  color: var(--text);
  box-shadow: var(--shadow);
  transition: transform .2s ease, box-shadow .2s ease;
}

.card:hover {
  transform: translateY(-4px);
}

.card h3 {
  margin: 0 0 6px;
  font-size: 1.05rem;
  color: var(--accent);
}

.card p {
  margin: 0;
  font-size: .9rem;
  color: var(--subtext);
  line-height: 1.4;
}

/* ================== Mobile ================== */
@media (max-width: 480px) {
  .topbar button {
    padding: 8px 10px;
    font-size: .8rem;
  }
}
</style>
</head>

<body target="_blank">

<!-- Top Bar -->
<div class="topbar">
  <input type="search" id="search" placeholder="Search links…">
  <button id="themeToggle">🌙</button>
</div>

<!-- Cards -->
<div class="container">
  <div class="grid" id="cards">
 
    <a class="card" href="https://github.com/">
      <h3>GitHub</h3>
      <p>Source code hosting and collaboration.</p>
    </a>

<a class="card" href="https://vscode.dev/github.com/">
      <h3>VScode</h3>
      <p>Source code hosting and online editor.</p>
    </a>

<a class="card" href="https://www.copilot.com/">
      <h3>Copilot</h3>
      <p>Copilot AI Agent</p>
    </a>

<a class="card" href="https://gemini.google.com/app">
      <h3>Gemini</h3>
      <p>Gemini AI Agent</p>
</a>

<a class="card" href="https://search.brave.com/ask?q=">
      <h3>Brave</h3>
      <p>Brave AI</p>
</a>


    
  </div>
</div>

<script>
/* ================== Theme ================== */
const body = document.body;
const toggle = document.getElementById("themeToggle");

if (localStorage.theme === "dark") {
  body.classList.add("dark");
  toggle.textContent = "☀️";
}

toggle.onclick = () => {
  body.classList.toggle("dark");
  const dark = body.classList.contains("dark");
  localStorage.theme = dark ? "dark" : "light";
  toggle.textContent = dark ? "☀️" : "🌙";
};

/* ================== Search ================== */
const search = document.getElementById("search");
const cards = document.querySelectorAll(".card");

search.addEventListener("input", () => {
  const q = search.value.toLowerCase();
  cards.forEach(card => {
    card.hidden = !card.textContent.toLowerCase().includes(q);
  });
});
</script>

</body>
</html>
