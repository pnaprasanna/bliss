<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<base target="_blank">
<title>Daily Links</title>

<style>
/* ================== Theme Variables ================== */
:root {
  --bg: #f4f6f8;
  --card: #ffffff;
  --text: #1f2937;
  --subtext: #4b5563;
  --accent: #2563eb;
  --shadow: 0 6px 18px rgba(0,0,0,.08);
}

body.dark {
  --bg: #0f172a;
  --card: #1e293b;
  --text: #e5e7eb;
  --subtext: #9ca3af;
  --accent: #60a5fa;
  --shadow: 0 8px 28px rgba(0,0,0,.6);
}

/* ================== Base ================== */
* {
  box-sizing: border-box;
  font-family:
    "Segoe UI",
    "Inter",
    "SF Pro Text",
    -apple-system,
    BlinkMacSystemFont,
    Arial,
    sans-serif;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  transition: background .25s ease;
}

/* ================== Top Bar ================== */
.topbar {
  position: sticky;
  top: 0;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: var(--card);
  box-shadow: var(--shadow);
  z-index: 20;
}

.hamburger {
  font-size: 1.2rem;
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--text);
}

.topbar input {
  flex: 1;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid #cbd5e1;
  background: transparent;
  color: var(--text);
}

.topbar button.theme {
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: var(--accent);
  color: #fff;
}

/* ================== Side Menu ================== */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  opacity: 0;
  visibility: hidden;
  transition: opacity .3s ease;
  z-index: 30;
}

.overlay.show {
  opacity: 1;
  visibility: visible;
}

.side-menu {
  position: fixed;
  top: 0;
  left: 0;
  width: 260px;
  height: 100%;
  background: var(--card);
  box-shadow: 4px 0 24px rgba(0,0,0,.2);
  transform: translateX(-100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  padding: 20px;
  z-index: 40;
}

.side-menu.open {
  transform: translateX(0);
}

.side-menu h3 {
  margin: 0 0 16px;
  color: var(--accent);
}

.side-menu a {
  display: block;
  padding: 10px 0;
  text-decoration: none;
  color: var(--text);
  font-size: .95rem;
  border-bottom: 1px solid rgba(0,0,0,.08);
}

/* ================== Cards ================== */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 16px;
}

.grid {
  display: grid;
  gap: 16px;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}

.card {
  background: var(--card);
  padding: 18px;
  border-radius: 14px;
  text-decoration: none;
  color: var(--text);
  box-shadow: var(--shadow);
  transition: transform .2s ease;
}

.card:hover {
  transform: translateY(-5px);
}

.card h3 {
  margin: 0 0 6px;
  color: var(--accent);
}

.card p {
  margin: 0;
  font-size: .9rem;
  color: var(--subtext);
}

/* ================== Mobile ================== */
@media (max-width: 480px) {
  .topbar input {
    font-size: .9rem;
  }
}
</style>
</head>

<body>

<!-- Side Menu -->
<div class="overlay" id="overlay"></div>

<nav class="side-menu" id="sideMenu">
  <h3>Menu</h3>
  <a href="#">Dashboard</a>
  <a href="#">Bookmarks</a>
  <a href="#">Favorites</a>
  <a href="#">Settings</a>
</nav>

<!-- Top Bar -->
<div class="topbar">
  <button class="hamburger" id="menuBtn">☰</button>
  <input type="search" id="search" placeholder="Search links…">
  <button class="theme" id="themeToggle">🌙</button>
</div>

<!-- Cards -->
<div class="container">
  <div class="grid" id="cards">
 
    <a class="card" href="https://github.com/">
      <h3>GitHub</h3>
      <p>Source code hosting and collaboration.</p>
    </a>

<a class="card" href="https://vscode.dev/github.com/">
      <h3>VScode</h3>
      <p>Source code hosting and online editor.</p>
    </a>

<a class="card" href="https://www.copilot.com/">
      <h3>Copilot</h3>
      <p>Copilot AI Agent</p>
    </a>

<a class="card" href="https://gemini.google.com/app">
      <h3>Gemini</h3>
      <p>Gemini AI Agent</p>
</a>

<a class="card" href="https://search.brave.com/ask?q=">
      <h3>Brave</h3>
      <p>Brave AI</p>
</a>
<a class="card" href="https://www.aitmpl.com/">
      <h3>AITMPL</h3>
      <p>AI TMPL</p>
</a>


  </div>
</div>

<script>
/* ================== Theme ================== */
const body = document.body;
const toggle = document.getElementById("themeToggle");

if (localStorage.theme === "dark") {
  body.classList.add("dark");
  toggle.textContent = "☀️";
}

toggle.onclick = () => {
  body.classList.toggle("dark");
  const dark = body.classList.contains("dark");
  localStorage.theme = dark ? "dark" : "light";
  toggle.textContent = dark ? "☀️" : "🌙";
};

/* ================== Search ================== */
const search = document.getElementById("search");
const cards = document.querySelectorAll(".card");

search.addEventListener("input", () => {
  const q = search.value.toLowerCase();
  cards.forEach(card => {
    card.hidden = !card.textContent.toLowerCase().includes(q);
  });
});

/* ================== Menu ================== */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");
const overlay = document.getElementById("overlay");

menuBtn.onclick = () => {
  sideMenu.classList.add("open");
  overlay.classList.add("show");
};

overlay.onclick = () => {
  sideMenu.classList.remove("open");
  overlay.classList.remove("show");
};
</script>

</body>
</html>
